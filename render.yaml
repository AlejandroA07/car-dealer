services:
  - type: web
    name: westcoast-cars-web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: westcoast-cars.web/Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:10000
      # These are public Render URLs (Free web services can't receive private-network traffic).
      # If your service URLs differ, update these in the Render dashboard.
      - key: Services__ApiUrl
        value: https://westcoast-cars-api.onrender.com
      - key: Services__AuthUrl
        value: https://westcoast-cars-auth-api.onrender.com

  - type: web
    name: westcoast-cars-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: westcoast-cars.api/Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - fromGroup: westcoast-cars-shared
      # Set this to an Aiven MySQL connection string that targets the `westcoast_cars_db` database.
      # Example format:
      # Server=HOST;Port=PORT;Database=westcoast_cars_db;Uid=USER;Pwd=PASSWORD;SslMode=Required;
      - key: ConnectionStrings__DefaultConnection
        sync: false

  - type: web
    name: westcoast-cars-auth-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: westcoast-cars.auth/Api/Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - fromGroup: westcoast-cars-shared
      # Set this to an Aiven MySQL connection string that targets the `westcoast_auth` database.
      # Example format:
      # Server=HOST;Port=PORT;Database=westcoast_auth;Uid=USER;Pwd=PASSWORD;SslMode=Required;
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: AdminSettings__Password
        sync: false

envVarGroups:
  - name: westcoast-cars-shared
    envVars:
      # Shared JWT signing key. Must match between `api` and `auth-api`.
      - key: JwtSettings__Secret
        generateValue: true
