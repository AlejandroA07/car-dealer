services:
  api:
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  auth-api:
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  web:
    ports:
      - "5002:8080"

  db:
    ports:
      - "3306:3306"
    container_name: westcoast-mysql

  auth-db:
    ports:
      - "3307:3306"
    container_name: westcoast-auth-mysql
